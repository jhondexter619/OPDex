services:
  - type: web
    name: opdex
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn website.app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPDEX_SCRAPE_INTERVAL
        value: "21600"
