services:
  - type: web
    name: opdex
    runtime: python
    buildCommand: git lfs install && git lfs pull && pip install -r requirements.txt
    startCommand: gunicorn website.app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPDEX_SCRAPE_INTERVAL
        value: "21600"
      - key: OPDEX_SKIP_FACE_DETECT
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPDEX_ADMIN_EMAILS
        sync: false
